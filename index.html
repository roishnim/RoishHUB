<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RoishHUB</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #f7f5ff;
    --surface: #ffffff;
    --surface2: #f0ecff;
    --surface3: #e8e2ff;
    --border: #ddd8f5;
    --border2: #ccc4f0;
    --text: #2d2550;
    --muted: #8878b8;
    --dim: #c0b8e0;
    --accent: #9b7fe8;
    --accent2: #7d5fd0;
    --accent-bg: rgba(155,127,232,0.08);
    --red: #e87090;
    --red-bg: rgba(232,112,144,0.1);
    --blue: #78a8e8;
    --blue-bg: rgba(120,168,232,0.1);
    --green: #70c8a0;
    --green-bg: rgba(112,200,160,0.1);
    --orange: #e8b870;
    --orange-bg: rgba(232,184,112,0.1);
    --purple: #b890e8;
    --purple-bg: rgba(184,144,232,0.1);
    --mint: #d8f0e8;
    --mint-text: #3d8060;
    --peach: #ffe8d8;
    --peach-text: #b06040;
    --sky: #d8ecff;
    --sky-text: #4060a8;
    --butter: #fffad0;
    --butter-text: #806820;
    --rose: #ffe0ec;
    --rose-text: #b04870;
    --lav: #ede8ff;
    --lav-text: #6848b0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    -webkit-font-smoothing: antialiased;
  }

  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: var(--surface2); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

  /* ── LAYOUT ── */
  .app { display: flex; height: 100vh; overflow: hidden; }

  .sidebar {
    width: 220px;
    flex-shrink: 0;
    background: linear-gradient(180deg, #f0eeff 0%, #e8f5f0 50%, #fff0f8 100%);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .logo {
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);
  }
  .logo-mark {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    letter-spacing: 0.5px;
    color: var(--accent);
    line-height: 1;
    font-weight: 700;
  }
  .logo-sub {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 3px;
  }

  .nav { padding: 12px 10px; flex: 1; }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    border-radius: 10px;
    cursor: pointer;
    color: var(--muted);
    font-size: 13px;
    font-weight: 500;
    transition: all 0.15s;
    margin-bottom: 2px;
    border: 1px solid transparent;
  }
  .nav-item:hover { background: rgba(255,255,255,0.7); color: var(--text); }
  .nav-item.active {
    background: white;
    color: var(--accent);
    border-color: var(--border2);
    box-shadow: 0 2px 8px rgba(155,127,232,0.12);
  }
  .nav-icon { font-size: 16px; width: 20px; text-align: center; }

  .sidebar-stats {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
  }
  .sidebar-stat { text-align: center; flex: 1; }
  .sidebar-stat-num { font-family: 'Playfair Display', serif; font-size: 18px; color: var(--accent); line-height: 1; font-weight: 700; }
  .sidebar-stat-label { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }

  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  .topbar {
    height: 56px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 24px;
    gap: 12px;
    flex-shrink: 0;
    background: white;
  }
  .topbar-title { font-family: 'Playfair Display', serif; font-size: 18px; letter-spacing: 0.3px; color: var(--text); flex: 1; font-weight: 700; }
  .topbar-count { font-size: 12px; color: var(--muted); background: var(--surface2); border: 1px solid var(--border); padding: 3px 10px; border-radius: 20px; }

  .content { flex: 1; overflow-y: auto; padding: 24px; background: var(--bg); }

  /* ── INPUTS ── */
  input, select, textarea {
    background: white;
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 10px;
    padding: 8px 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
    width: 100%;
  }
  input:focus, select:focus, textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(232,114,154,0.12);
  }
  input::placeholder, textarea::placeholder { color: var(--dim); }
  select option { background: white; color: var(--text); }

  .search-row {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .search-row input { flex: 1; min-width: 200px; }
  .search-row select { width: 160px; flex-shrink: 0; }

  /* ── BUTTONS ── */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn-primary { background: var(--accent); color: white; box-shadow: 0 2px 8px rgba(155,127,232,0.3); }
  .btn-primary:hover { background: var(--accent2); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(155,127,232,0.4); }
  .btn-secondary { background: white; color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { background: var(--surface2); border-color: var(--border2); }
  .btn-danger { background: var(--red-bg); color: var(--red); border: 1px solid rgba(232,112,144,0.2); }
  .btn-danger:hover { background: rgba(232,112,144,0.15); }
  .btn-ghost { background: transparent; color: var(--muted); border: 1px solid transparent; padding: 6px 10px; }
  .btn-ghost:hover { background: var(--surface2); color: var(--text); }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; box-shadow: none !important; }

  /* ── TABLE ── */
  .table-wrap { background: white; border: 1px solid var(--border); border-radius: 14px; overflow: hidden; box-shadow: 0 2px 12px rgba(232,114,154,0.06); }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    text-align: left;
    padding: 12px 16px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
    white-space: nowrap;
  }
  tbody td { padding: 13px 16px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr { transition: background 0.1s; cursor: pointer; }
  tbody tr:hover td { background: var(--surface2); }

  /* ── BADGES ── */
  .badge {
    display: inline-flex;
    align-items: center;
    padding: 3px 9px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    border: 1px solid;
    white-space: nowrap;
  }
  .badge-blue { background: var(--sky); color: var(--sky-text); border-color: #b8d8f8; }
  .badge-green { background: var(--mint); color: var(--mint-text); border-color: #a0d8c0; }
  .badge-red { background: var(--rose); color: var(--rose-text); border-color: #f0b8cc; }
  .badge-orange { background: var(--peach); color: var(--peach-text); border-color: #f0c8a8; }
  .badge-purple { background: var(--lav); color: var(--lav-text); border-color: #c8b8f0; }
  .badge-accent { background: var(--accent-bg); color: var(--accent); border-color: rgba(155,127,232,0.3); }
  .badge-muted { background: var(--surface2); color: var(--muted); border-color: var(--border); }
  .badge-pink { background: var(--rose); color: var(--rose-text); border-color: #f0b8cc; }
  .badge-mint { background: var(--mint); color: var(--mint-text); border-color: #a0d8c0; }
  .badge-butter { background: var(--butter); color: var(--butter-text); border-color: #e8d888; }

  /* ── CARDS ── */
  .card { background: white; border: 1px solid var(--border); border-radius: 14px; padding: 20px; box-shadow: 0 2px 8px rgba(232,114,154,0.06); }
  .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(180,80,120,0.15);
    backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
    z-index: 100; padding: 20px;
    animation: fadeIn 0.15s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    background: white;
    border: 1px solid var(--border);
    border-radius: 20px;
    width: 100%;
    max-width: 560px;
    max-height: 90vh;
    overflow-y: auto;
    animation: slideUp 0.2s ease;
    box-shadow: 0 20px 60px rgba(232,114,154,0.2);
  }
  @keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  .modal-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(135deg, var(--lav), var(--mint));
    border-radius: 20px 20px 0 0;
  }
  .modal-title { font-family: 'Playfair Display', serif; font-size: 18px; color: var(--text); font-weight: 700; }
  .modal-body { padding: 24px; }
  .modal-footer { padding: 0 24px 20px; display: flex; gap: 10px; justify-content: flex-end; }
  .close-btn { background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; padding: 4px; line-height: 1; border-radius: 6px; }
  .close-btn:hover { color: var(--accent); background: rgba(255,255,255,0.5); }

  /* ── FORM ── */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-full { grid-column: 1 / -1; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }

  /* ── DETAIL VIEW ── */
  .detail-header {
    display: flex; align-items: flex-start;
    gap: 16px; margin-bottom: 24px;
  }
  .detail-avatar {
    width: 52px; height: 52px; border-radius: 14px;
    background: linear-gradient(135deg, #ede8ff, #d8f0e8);
    border: 1px solid var(--border2);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 20px; color: var(--accent);
    flex-shrink: 0; font-weight: 700;
  }
  .detail-name { font-family: 'Playfair Display', serif; font-size: 24px; color: var(--text); line-height: 1; font-weight: 700; }
  .detail-sub { font-size: 13px; color: var(--muted); margin-top: 4px; }
  .detail-actions { display: flex; gap: 8px; margin-left: auto; flex-wrap: wrap; }

  .info-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .info-item { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 12px; }
  .info-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
  .info-value { font-size: 13px; color: var(--text); font-weight: 500; }

  .section-label {
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 2px; color: var(--muted); margin-bottom: 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* ── EMPTY STATE ── */
  .empty {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 60px 20px; text-align: center;
  }
  .empty-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.4; }
  .empty-text { color: var(--muted); font-size: 14px; margin-bottom: 16px; }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: white;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 18px;
    font-size: 13px;
    display: flex; align-items: center; gap: 10px;
    animation: slideInRight 0.3s ease;
    z-index: 999;
    box-shadow: 0 8px 24px rgba(232,114,154,0.2);
    max-width: 320px;
    color: var(--text);
  }
  @keyframes slideInRight { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
  .toast-success { border-color: rgba(112,200,160,0.4); }
  .toast-success .toast-icon { color: var(--mint-text); }
  .toast-error { border-color: rgba(232,85,85,0.3); }
  .toast-error .toast-icon { color: var(--red); }

  /* ── LOADING ── */
  .loading-row td { text-align: center; padding: 40px; color: var(--muted); }
  .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── BACK BUTTON ── */
  .back-btn { display: inline-flex; align-items: center; gap: 6px; color: var(--muted); cursor: pointer; font-size: 13px; padding: 6px 0; margin-bottom: 20px; }
  .back-btn:hover { color: var(--accent); }

  /* ── LINKED CONTACTS ── */
  .linked-contact {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 14px; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 10px;
    cursor: pointer; transition: all 0.15s; margin-bottom: 8px;
  }
  .linked-contact:hover { border-color: var(--accent); background: var(--accent-bg); }
  .linked-contact-avatar { width: 32px; height: 32px; border-radius: 8px; background: white; border: 1px solid var(--border2); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: var(--accent); }
  .linked-contact-name { font-weight: 600; font-size: 13px; }
  .linked-contact-title { font-size: 11px; color: var(--muted); }

  /* ── PAGE TRANSITIONS ── */
  .page { animation: pageFadeIn 0.2s ease; }
  @keyframes pageFadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  textarea { resize: vertical; min-height: 80px; }
  a.external { color: var(--accent); text-decoration: none; font-size: 12px; }
  a.external:hover { text-decoration: underline; }
  .tag { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; font-size: 11px; color: var(--muted); margin: 2px; }

  /* ── IMPORT ── */
  .drop-zone {
    border: 2px dashed var(--border2);
    border-radius: 16px;
    padding: 60px 40px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: white;
  }
  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--accent);
    background: var(--accent-bg);
  }
  .drop-icon { font-size: 48px; margin-bottom: 16px; }
  .drop-title { font-family: 'Playfair Display', serif; font-size: 22px; margin-bottom: 8px; color: var(--text); }
  .drop-sub { color: var(--muted); font-size: 13px; }

  .mapping-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
  .mapping-table th { text-align: left; padding: 8px 12px; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); border-bottom: 1px solid var(--border); background: var(--surface2); }
  .mapping-table td { padding: 8px 12px; border-bottom: 1px solid var(--border); font-size: 13px; vertical-align: middle; }
  .mapping-table tr:last-child td { border-bottom: none; }
  .col-sample { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .mapped-to { display: inline-flex; align-items: center; padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
  .mapped-contact { background: var(--blue-bg); color: #5580cc; }
  .mapped-company { background: var(--green-bg); color: var(--mint-text); }
  .mapped-skip { background: var(--surface2); color: var(--dim); }

  .preview-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .preview-table th { text-align: left; padding: 6px 10px; background: var(--surface2); color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid var(--border); white-space: nowrap; }
  .preview-table td { padding: 6px 10px; border-bottom: 1px solid var(--border); color: var(--text); white-space: nowrap; max-width: 140px; overflow: hidden; text-overflow: ellipsis; }
  .preview-table tr:nth-child(even) td { background: var(--surface2); }

  .import-stat { text-align: center; padding: 16px; background: white; border: 1px solid var(--border); border-radius: 12px; box-shadow: 0 2px 8px rgba(232,114,154,0.06); }
  .import-stat-num { font-family: 'Playfair Display', serif; font-size: 28px; line-height: 1; font-weight: 700; }
  .import-stat-label { font-size: 11px; color: var(--muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 1px; }

  .progress-bar { height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; margin: 12px 0; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.3s ease; }

  .step-indicator { display: flex; align-items: center; gap: 0; margin-bottom: 28px; }
  .step { display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 600; color: var(--dim); }
  .step.active { color: var(--accent); }
  .step.done { color: var(--mint-text); }
  .step-num { width: 24px; height: 24px; border-radius: 50%; border: 2px solid currentColor; display: flex; align-items: center; justify-content: center; font-size: 11px; flex-shrink: 0; }
  .step-line { flex: 1; height: 1px; background: var(--border); margin: 0 8px; min-width: 20px; }

  /* ── PROSPECTS ── */
  .prospect-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px;
    transition: all 0.15s;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(232,114,154,0.06);
  }
  .prospect-card:hover { border-color: var(--accent); box-shadow: 0 4px 16px rgba(232,114,154,0.15); transform: translateY(-2px); }
  .prospect-card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 12px; }
  .prospect-card-name { font-family: 'Playfair Display', serif; font-size: 15px; font-weight: 700; color: var(--text); }
  .prospect-card-industry { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .prospect-card-meta { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
  .prospect-card-footer { display: flex; align-items: center; justify-content: space-between; }

  .priority-high { background: var(--rose); color: var(--rose-text); border-color: #f0b8cc; }
  .priority-medium { background: var(--peach); color: var(--peach-text); border-color: #f0c8a8; }
  .priority-low { background: var(--mint); color: var(--mint-text); border-color: #a0d8c0; }
  .sf-yes { background: var(--sky); color: var(--sky-text); border-color: #b8d8f8; }
</style>
</head>
<body>
<div class="app">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="logo">
      <div class="logo-mark">✦ RoishHUB</div>
      <div class="logo-sub">Sponsorships Hub</div>
    </div>
    <nav class="nav">
      <div class="nav-item active" onclick="showPage('companies')" id="nav-companies">
        <span class="nav-icon">🏢</span> Companies
      </div>
      <div class="nav-item" onclick="showPage('contacts')" id="nav-contacts">
        <span class="nav-icon">👤</span> Contacts
      </div>
      <div class="nav-item" onclick="showPage('prospects')" id="nav-prospects">
        <span class="nav-icon">🌸</span> Prospects
      </div>
      <div class="nav-item" onclick="showPage('import')" id="nav-import">
        <span class="nav-icon">📥</span> Import CSV
      </div>
    </nav>
    <div class="sidebar-stats">
      <div class="sidebar-stat">
        <div class="sidebar-stat-num" id="stat-companies">—</div>
        <div class="sidebar-stat-label">Companies</div>
      </div>
      <div class="sidebar-stat">
        <div class="sidebar-stat-num" id="stat-contacts">—</div>
        <div class="sidebar-stat-label">Contacts</div>
      </div>
      <div class="sidebar-stat">
        <div class="sidebar-stat-num" id="stat-prospects">—</div>
        <div class="sidebar-stat-label">Prospects</div>
      </div>
    </div>
  </div>

async function loadAll() {
  const [cosRes, ctsRes, prosRes] = await Promise.all([
    db.from('companies').select('*').order('name'),
    db.from('contacts').select('*, companies(name)').order('last_name'),
    db.from('prospects').select('*').order('created_at', { ascending: false }),
  ]);
  if (cosRes.error) throw new Error('Companies: ' + cosRes.error.message);
  if (ctsRes.error) throw new Error('Contacts: ' + ctsRes.error.message);
  companies = cosRes.data || [];
  contacts = ctsRes.data || [];
  prospects = prosRes.data || [];
  document.getElementById('stat-companies').textContent = companies.length;
  document.getElementById('stat-contacts').textContent = contacts.length;
  document.getElementById('stat-prospects').textContent = prospects.length;
}

function filterCompanies() {
  return companies.filter(c => {

    const matchCountry = !companyFilterCountry || c.country === companyFilterCountry;
    return matchSearch && matchIndustry && matchCountry;
  });
}

// Smart auto-detection: maps any column header to a CRM field
const FIELD_HINTS = {

  notes:            ['notes','note','comments','comment','bio','description'],

                     'partner account name','partner account','company account','account: name'],

};

const FIELD_LABELS = {

  department: 'Department', location: 'Location', linkedin_url: 'LinkedIn URL', notes: 'Notes',

  company_industry: 'Industry', company_country: 'Company Country',
  company_city: 'Company City', company_linkedin: 'Company LinkedIn',
  company_size: 'Company Size', _skip: '— Skip this column —',
};

function autoDetectMapping(headers) {
  const mapping = {};
  for (const h of headers) {
    const lower = h.toLowerCase().trim();
    let matched = '_skip';
    for (const [field, hints] of Object.entries(FIELD_HINTS)) {
      if (hints.some(hint => lower === hint || lower.includes(hint) || hint.includes(lower))) {
        matched = field;
        break;
      }
    }
    mapping[h] = matched;
  }
  return mapping;
}

function parseCSV(text) {
  // Handle both comma and semicolon delimiters, and quoted fields
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  if (lines.length < 2) return { headers: [], rows: [] };

  // Detect delimiter — check first few lines to find the one with most separators
  let delim = ',';
  for (const line of lines.slice(0, 5)) {
    const commas = (line.match(/,/g) || []).length;
    const semis = (line.match(/;/g) || []).length;
    if (semis > commas && semis > 2) { delim = ';'; break; }
    if (commas > 2) { delim = ','; break; }
  }

  function parseLine(line) {
    const result = [];
    let current = '';
    let inQuotes = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') {
        if (inQuotes && line[i+1] === '"') { current += '"'; i++; }
        else inQuotes = !inQuotes;
      } else if (ch === delim && !inQuotes) {
        result.push(current.trim());
        current = '';
      } else {
        current += ch;
      }
    }
    result.push(current.trim());
    return result;
  }

  // Smart header detection: find the first line that looks like real column headers
  // A real header row has multiple columns AND contains recognisable field-like words
  // Skip rows that are just a report title (1 column, or a long single string with no delimiters)
  const HEADER_CLUES = ['name','email','first','last','company','title','phone','linkedin',
    'website','industry','country','department','account','attendance','partner','contact'];

  let headerLineIndex = 0;
  for (let i = 0; i < Math.min(5, lines.length); i++) {
    const cols = parseLine(lines[i]);
    const joined = cols.join(' ').toLowerCase();
    const hasMultipleCols = cols.length > 1;
    const looksLikeHeaders = HEADER_CLUES.some(clue => joined.includes(clue));
    if (hasMultipleCols && looksLikeHeaders) {
      headerLineIndex = i;
      break;
    }
  }

  const headers = parseLine(lines[headerLineIndex]).map(h => h.replace(/^"|"$/g, '').trim());
  const rows = [];
  for (let i = headerLineIndex + 1; i < lines.length; i++) {
    const values = parseLine(lines[i]);
    if (values.every(v => !v)) continue; // skip blank rows
    const row = {};
    headers.forEach((h, idx) => { row[h] = (values[idx] || '').replace(/^"|"$/g, '').trim(); });
    rows.push(row);
  }
  return { headers, rows };
}

function renderImport() {

  importHeaders = [];

function handleFileDrop(event) {
  event.preventDefault();
  document.getElementById('drop-zone')?.classList.remove('drag-over');
  const file = event.dataTransfer.files[0];
  if (file) processFile(file);
}

function handleFileSelect(event) {
  const file = event.target.files[0];
  if (file) processFile(file);
}

function processFile(file) {
  if (!file.name.match(/\.(csv|txt)$/i)) {
    showToast('Please upload a .csv file', 'error'); return;
  }
  importFilename = file.name;
  const reader = new FileReader();
  reader.onload = (e) => {
    const { headers, rows } = parseCSV(e.target.result);
    if (headers.length === 0 || rows.length === 0) {
      showToast('Could not read file — make sure it is a valid CSV', 'error'); return;
    }
    importHeaders = headers;
    importRows = rows;
    importMapping = autoDetectMapping(headers);
    importStep = 'mapping';
    renderImportStep();
  };
  reader.readAsText(file);
}

function goToPreview() {
  const hasMeaningfulMapping = Object.values(importMapping).some(v => v !== '_skip');
  if (!hasMeaningfulMapping) {
    showToast('Please map at least one column before continuing', 'error'); return;
  }
  importStep = 'preview';
  renderImportStep();
}

function buildPreviewData() {
  const contactsOut = [];
  const companiesSet = new Map(); // company_name (lowercase) → company object
  let skipped = 0;

  for (const row of importRows) {
    // Build mapped object from this row
    const mapped = {};
    for (const [header, field] of Object.entries(importMapping)) {
      if (field !== '_skip' && row[header]) mapped[field] = row[header];
    }

    const firstName = mapped.first_name || '';
    const lastName = mapped.last_name || '';
    if (!firstName && !lastName) { skipped++; continue; }

    // Company data
    const companyName = mapped.company_name || '';
    if (companyName) {
      const key = companyName.toLowerCase().trim();
      if (!companiesSet.has(key)) {
        companiesSet.set(key, {
          name: companyName,
          website: mapped.company_website || null,
          industry: mapped.company_industry || null,
          country: mapped.company_country || null,
          city: mapped.company_city || null,
          linkedin_url: mapped.company_linkedin || null,
          size: mapped.company_size || null,
          tags: [],
        });
      }
    }

    contactsOut.push({
      first_name: firstName,
      last_name: lastName,
      email: mapped.email || null,
      phone: mapped.phone || null,
      title: mapped.title || null,
      seniority: normaliseSeniority(mapped.seniority),
      department: mapped.department || null,
      location: mapped.location || null,
      linkedin_url: mapped.linkedin_url || null,
      notes: mapped.notes || null,
      _company_name: companyName,
      _company_industry: mapped.company_industry || '',
      _company_country: mapped.company_country || '',
    });
  }

  return {
    contacts: contactsOut,
    companies: [...companiesSet.values()],
    skipped,
  };
}

function normaliseSeniority(raw) {
  if (!raw) return null;
  const r = raw.toLowerCase();
  if (r.includes('c-suite') || r.includes('c-level') || r.includes('chief') || r.includes('ceo') || r.includes('cto') || r.includes('cfo') || r.includes('coo') || r.includes('cmo') || r.includes('president')) return 'C-Suite';
  if (r.includes('vp') || r.includes('vice president') || r.includes('vice-president')) return 'VP';
  if (r.includes('director')) return 'Director';
  if (r.includes('manager') || r.includes('head of') || r.includes('lead')) return 'Manager';
  return 'Other';
}

async function runImport() {
  importStep = 'importing';
  renderImportStep();

  const { contacts: contactsToImport, companies: companiesToImport } = buildPreviewData();
  const setProgress = (pct, text) => {
    const bar = document.getElementById('import-progress-bar');
    const txt = document.getElementById('import-progress-text');
    if (bar) bar.style.width = pct + '%';
    if (txt) txt.textContent = text;
  };

  try {
    setProgress(10, `Creating ${companiesToImport.length} companies…`);

    // Step 1: Fetch existing companies to avoid duplicates
    const { data: existingCos } = await db.from('companies').select('id, name');
    const existingCoMap = new Map((existingCos||[]).map(c => [c.name.toLowerCase().trim(), c.id]));

    // Step 2: Insert new companies
    const newCompanies = companiesToImport.filter(c => !existingCoMap.has(c.name.toLowerCase().trim()));
    if (newCompanies.length > 0) {
      const { data: inserted, error } = await db.from('companies').insert(newCompanies).select('id, name');
      if (error) throw new Error('Company insert failed: ' + error.message);
      (inserted||[]).forEach(c => existingCoMap.set(c.name.toLowerCase().trim(), c.id));
    }

    setProgress(40, `Importing ${contactsToImport.length} contacts…`);

    // Step 3: Fetch existing contacts by email to avoid duplicates
    const { data: existingCts } = await db.from('contacts').select('id, email');
    const existingEmailSet = new Set((existingCts||[]).map(c => c.email?.toLowerCase()).filter(Boolean));

    // Step 4: Build contact insert payloads
    const contactPayloads = [];
    for (const c of contactsToImport) {
      // Skip if email already exists
      if (c.email && existingEmailSet.has(c.email.toLowerCase())) continue;

      const companyId = c._company_name
        ? (existingCoMap.get(c._company_name.toLowerCase().trim()) || null)
        : null;

      contactPayloads.push({
        first_name: c.first_name,
        last_name: c.last_name,
        email: c.email,
        phone: c.phone,
        title: c.title,
        seniority: c.seniority,
        department: c.department,
        location: c.location,
        linkedin_url: c.linkedin_url,
        notes: c.notes,
        company_id: companyId,
      });
    }

    setProgress(70, `Saving ${contactPayloads.length} contacts to database…`);

    // Insert in batches of 100
    let insertedCount = 0;
    const batchSize = 100;
    for (let i = 0; i < contactPayloads.length; i += batchSize) {
      const batch = contactPayloads.slice(i, i + batchSize);
      const { error } = await db.from('contacts').insert(batch);
      if (error) throw new Error('Contact insert failed: ' + error.message);
      insertedCount += batch.length;
      setProgress(70 + Math.floor((insertedCount / contactPayloads.length) * 25), `Saved ${insertedCount} of ${contactPayloads.length}…`);
    }

    setProgress(100, 'Done!');

    // Reload data
    await loadAll();

    // Show done screen
    importStep = 'done';
    renderImportStep();
    document.getElementById('done-summary').textContent =
      `Added ${newCompanies.length} companies and ${insertedCount} contacts to your CRM.` +
      (contactsToImport.length - insertedCount > 0 ? ` (${contactsToImport.length - insertedCount} skipped — already existed)` : '');

    showToast(`Imported ${insertedCount} contacts ✓`, 'success');

  } catch(err) {
    importStep = 'preview';
    renderImportStep();
    showToast('Import failed: ' + err.message, 'error');
  }
}

function escape(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function getInitials(name) {
  const parts = (name||'').trim().split(' ').filter(Boolean);
  if (parts.length >= 2) return (parts[0][0] + parts[parts.length-1][0]).toUpperCase();
  return (parts[0]||'?').substring(0,2).toUpperCase();
}

function seniorityBadge(s) {
  const map = { 'C-Suite': 'badge-accent', 'VP': 'badge-purple', 'Director': 'badge-blue', 'Manager': 'badge-green', 'Other': 'badge-muted' };
  return map[s] || 'badge-muted';
}

function copyText(text) {
  navigator.clipboard.writeText(text).then(() => showToast('Copied to clipboard ✓', 'success'));
}

function showToast(msg, type = 'success') {
  const old = document.getElementById('toast');
  if (old) old.remove();
  const icon = type === 'success' ? '✓' : '✕';
  const t = document.createElement('div');
  t.id = 'toast';
  t.className = `toast toast-${type}`;
  t.innerHTML = `<span class="toast-icon">${icon}</span> ${msg}`;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}
